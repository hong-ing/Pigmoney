name: pigmoney
description: "A new Flutter project."
publish_to: 'none'

version: 2.8.0+146

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  permission_handler: ^12.0.1
  uuid: ^4.5.3
  path_provider: ^2.1.5
  velocity_x: ^4.3.0
  collection: ^1.19.1
  intl: ^0.20.2
  audioplayers: ^6.6.0
  vibration: ^3.1.8
  url_launcher: ^6.3.1
  flutter_custom_tabs: ^2.1.0
  dotted_border: ^3.0.1
  in_app_review: ^2.0.10

  tnk_flutter_rwd: ^0.5.6

  # 앱 추적 투명성
  app_tracking_transparency: ^2.0.6+1

  # 광고 ID
  advertising_id: ^2.7.1

  # Android 기기 고유 ID (SSAID)
  android_id: ^0.4.0

  # webview
  webview_flutter: ^4.9.0

  # AdMob
  google_mobile_ads: ^8.0.0
  gma_mediation_meta: ^1.5.2
  gma_mediation_unity: ^1.8.0
  gma_mediation_ironsource: ^2.4.1
  gma_mediation_pangle: ^3.6.0
  gma_mediation_liftoffmonetize: ^1.5.0
  gma_mediation_mintegral: ^2.1.0
  gma_mediation_inmobi: ^2.1.0
  gma_mediation_dtexchange: ^1.3.4
  gma_mediation_moloco: ^3.4.0
  gma_mediation_line: ^2.1.0

  # Secure Storage (Keychain on iOS, EncryptedSharedPreferences on Android)
  flutter_secure_storage: ^10.2.0

  # Data
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  http: ^1.4.0

  # 이미지 캐싱
  cached_network_image: ^3.3.1

  # 암호화
  encrypt: ^5.0.3
  crypto: ^3.0.6
  cryptography: ^2.7.0
  #  cryptography_flutter: ^2.3.2

  #Firebase
  cloud_firestore: ^5.6.9
  firebase_core: ^3.14.0
  firebase_remote_config: ^5.4.5
#  firebase_app_check: ^0.3.2+7
  firebase_analytics: ^11.5.0
  firebase_auth: ^5.6.0
  firebase_crashlytics: ^4.3.7

  # Barcode generation
  barcode_widget: ^2.0.4

  # Image share (권한 불필요)
  share_plus: ^13.1.0

  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1

  # 인터넷 연결 감지
  connectivity_plus: ^6.1.1
  sim_card_code: ^0.1.0

  # 보안 (루팅/에뮬레이터 탐지)
  safe_device: ^1.1.9

  my_chips_flutter_sdk: ^1.0.2

  s2offerwall_flutter: ^1.0.25

  # Kakao Login
  kakao_flutter_sdk: ^1.9.5

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Apple Sign-In (iOS)
  sign_in_with_apple: ^6.1.4

  # Deep Linking (App Links / Universal Links)
  app_links: ^6.3.3

  # Play Store Install Referrer (스토어 경유 설치 시 초대코드 전달)
  play_install_referrer: ^0.5.0

  # 만보기 (Step Counter Sensor)
  pedometer_2: ^5.0.4
  auto_size_text: ^3.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  logger: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ic_logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#ff000000"
  adaptive_icon_foreground: "assets/icons/ic_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: BMJUA
      fonts:
        - asset: assets/fonts/BMJUA_ttf.ttf
    - family: SsangmunDong
      fonts:
        - asset: assets/fonts/Typo_SsangmunDongB.ttf

